<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OVBC Company Portal</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f3f2ef;
    color:#333;
}

/* REMOVE EMPTY SPACE */
.main-wrapper{
    width:100%;
    display:flex;
    justify-content:center;
}

/* MAIN CONTENT */
.container{
    width:100%;
    max-width:980px;
    padding:12px 16px 8px;
    background:#faf8f2;
}

/* TITLE */
.section-title{
    font-size:20px;
    font-weight:700;
    color:#b8860b;
    margin-bottom:14px;
}

/* GRID */
.department-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
}

/* CARD */
.department-card{
    background:#fff;
    border-radius:12px;
    padding:10px;
    border-left:3px solid #d4a017;
    box-shadow:0 1px 6px rgba(0,0,0,0.05);
    transition:0.2s;
}

.department-card:hover{
    transform:translateY(-2px);
}

/* HEADER */
.dept-header{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

/* ICON */
.dept-icon{
    width:32px;
    height:32px;
    border-radius:8px;
    background:linear-gradient(135deg,#c69214,#ffd54f);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    margin-right:8px;
}

.dept-name{
    font-size:14px;
    font-weight:600;
}

/* FOLDER */
.folder-list{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.folder-link{
    text-decoration:none;
    background:#fffaf0;
    border:1px solid #f0dfb0;
    color:#333;
    padding:6px 8px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    transition:0.2s;
}

.folder-link:hover{
    background:#d4a017;
    color:#fff;
}

.folder-type{
    font-size:10px;
    opacity:0.75;
}

/* FOOTER */
.footer{
    text-align:center;
    padding-top:16px;
    font-size:11px;
    color:#8b7355;
}

</style>
</head>

<body>
