<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OVBC Company Portal</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

/* FORCE SHAREPOINT AUTO HEIGHT */
html,
body,
#spPageCanvasContent,
.CanvasLayout,
.CanvasZone,
.CanvasComponent,
.ControlZone,
.mainContent,
.spAppAndPropertyPanelContainer,
[data-automation-id="CanvasZone"],
[data-automation-id="CanvasSection"]{
    min-height:unset !important;
    height:auto !important;
    max-height:none !important;
    padding-bottom:0 !important;
    margin-bottom:0 !important;
    background:transparent !important;
}

/* REMOVE FULL SCREEN HEIGHT */
body,
html{
    overflow-x:hidden !important;
    overflow-y:hidden !important;
}

/* IMPORTANT */
.CanvasZone{
    display:inline-block !important;
    width:100% !important;
}

/* REMOVE BIG GRAY AREA */
div[data-automation-id="CanvasZone"]{
    min-height:0 !important;
}

/* PAGE */
body{
    display:flex;
    justify-content:center;
    padding:10px;
}

/* MAIN */
.portal-container{
    width:100%;
    max-width:1100px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* TITLE */
.portal-title{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;

    font-size:34px;
    font-weight:700;
    color:#b8860b;

    margin-bottom:22px;
    letter-spacing:0.5px;
}

/* GRID */
.department-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:14px;
}

/* CARD */
.department-card{
    background:#fff;
    border-radius:16px;
    padding:14px;
    border-left:4px solid #d4a017;

    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    transition:0.2s ease;
}

.department-card:hover{
    transform:translateY(-3px);
    box-shadow:0 6px 16px rgba(0,0,0,0.10);
}

/* HEADER */
.dept-header{
    display:flex;
    align-items:center;
    margin-bottom:12px;
}

/* ICON */
.dept-icon{
    width:42px;
    height:42px;

    border-radius:12px;

    background:linear-gradient(135deg,#c69214,#ffd54f);

    color:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:16px;
    margin-right:10px;

    box-shadow:0 2px 8px rgba(212,160,23,0.25);
}

/* NAME */
.dept-name{
    font-size:17px;
    font-weight:600;
    color:#333;
}

/* FOLDER */
.folder-list{
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* BUTTON */
.folder-link{
    text-decoration:none;

    background:#fffaf0;
    border:1px solid #f0dfb0;

    color:#333;

    padding:8px 10px;
    border-radius:10px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    font-size:13px;

    transition:0.2s;
}

.folder-link:hover{
    background:#d4a017;
    color:#fff;
}

/* TYPE */
.folder-type{
    font-size:11px;
    opacity:0.75;
}

/* FOOTER */
.footer{
    margin-top:18px;
    font-size:12px;
    color:#8b7355;
    text-align:center;
}

/* MOBILE */
@media(max-width:768px){

    .portal-title{
        font-size:26px;
    }

    .department-grid{
        grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    }

}

</style>
</head>
