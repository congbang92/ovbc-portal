<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OVBC Company Portal</title>

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#faf8f2;
    color:#333;
}

/* MAIN */
.container{
    max-width:1150px;
    margin:auto;
    padding:10px 20px 20px;
}

/* TITLE */
.section-title{
    font-size:22px;
    font-weight:700;
    color:#b8860b;
    margin-bottom:16px;
}

/* GRID */
.department-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:14px;
}

/* CARD */
.department-card{
    background:#fff;
    border-radius:14px;
    padding:14px;
    border-left:4px solid #d4a017;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
    transition:0.2s;
}

.department-card:hover{
    transform:translateY(-2px);
    box-shadow:0 5px 12px rgba(0,0,0,0.08);
}

/* HEADER */
.dept-header{
    display:flex;
    align-items:center;
    margin-bottom:12px;
}

/* ICON */
.dept-icon{
    width:38px;
    height:38px;
    border-radius:10px;
    background:linear-gradient(135deg,#c69214,#ffd54f);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    margin-right:10px;
    box-shadow:0 2px 6px rgba(212,160,23,0.25);
}

.dept-name{
    font-size:16px;
    font-weight:600;
}

/* FOLDER */
.folder-list{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.folder-link{
    text-decoration:none;
    background:#fffaf0;
    border:1px solid #f0dfb0;
    color:#333;
    padding:8px 10px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    transition:0.2s;
}

.folder-link:hover{
    background:#d4a017;
    color:#fff;
}

.folder-type{
    font-size:11px;
    opacity:0.75;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:18px;
    color:#8b7355;
    font-size:12px;
}

@media(max-width:768px){

    .container{
        padding:10px 14px 20px;
    }

}

</style>
</head>

<body>

<div class="container">

                href="https://baochung.sharepoint.com/sites/SP_FI/Shared%20Documents/Forms/AllItems.aspx"
